// ─── UTILS ────────────────────────────────────────────────────
function calcTax(income, brackets) {
  if (income <= 0) return 0;
  let t = 0;
  for (const b of brackets) {
    if (income <= b.min) break;
    t += (Math.min(income, b.max === Infinity ? income : b.max) - b.min) * b.rate;
  }
  return t;
}
function marginalRate(income, brackets) {
  let r = 0;
  for (const b of brackets) { if (income > b.min) r = b.rate; }
  return r * 100;
}
const fK = n => n>=1000?`$${(n/1000).toFixed(0)}k`:`$${n}`;
const fAUD = n => `$${Math.round(n).toLocaleString('en-AU')}`;
const fPct = (n,d=1) => `${(+n).toFixed(d)}%`;

// ─── TAB 1: PERSONAL INCOME TAX ───────────────────────────────
function PersonalTaxTab() {
  const [activeEras,setActiveEras] = useState(new Set(INCOME_ERAS.map(e=>e.id)));
  const [mode,setMode] = useState('effective');
  const [income,setIncome] = useState(85000);
  const [expanded,setExpanded] = useState(null);
  const [showEarners,setShowEarners] = useState(true);

  const toggleEra = id => setActiveEras(prev=>{
    const n=new Set(prev);
    if(n.has(id)){if(n.size>1)n.delete(id);}else n.add(id);
    return n;
  });

  const chartData = useMemo(()=>INCOME_PTS.map(inc=>{
    const pt={income:inc};
    for(const era of INCOME_ERAS){
      if(!activeEras.has(era.id)) continue;
      const tax=calcTax(inc,era.brackets);
      pt[era.id]=mode==='effective'
        ? (inc>0?parseFloat((tax/inc*100).toFixed(2)):0)
        : mode==='marginal'
          ? marginalRate(inc,era.brackets)
          : Math.round(tax);
    }
    return pt;
  }),[activeEras,mode]);

  const sliderRows = useMemo(()=>INCOME_ERAS.map(era=>{
    const tax=calcTax(income,era.brackets);
    return{...era,tax,eff:income>0?tax/income*100:0,marg:marginalRate(income,era.brackets),home:income-tax};
  }).filter(e=>activeEras.has(e.id)).sort((a,b)=>a.tax-b.tax),[income,activeEras]);

  const MODES=[{id:'effective',label:'Effective Rate'},{id:'marginal',label:'Marginal Rate'},{id:'dollar',label:'Tax Paid ($)'}];

                  </table>
                  <div style={{marginTop:8,fontSize:11,color:C.t3,lineHeight:1.6}}>{era.note}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── TAB 3: INVESTOR BREAKS ───────────────────────────────────
function InvestorBreaksTab() {
  const [cgtIncome,setCgtIncome] = useState(120000);
  const [cgtGain,setCgtGain] = useState(80000);
  const [held12,setHeld12] = useState(true);
  const [era,setEra] = useState('albanese_2024');

  const brackets = INCOME_ERAS.find(e=>e.id===era)?.brackets??[];
  const discount = held12 ? 0.5 : 1.0;
  const taxableGain = cgtGain * discount;
  const taxOnTotal = calcTax(cgtIncome + taxableGain, brackets);
  const taxOnIncome = calcTax(cgtIncome, brackets);
  const cgtTax = taxOnTotal - taxOnIncome;
  const effRate = cgtGain > 0 ? cgtTax / cgtGain * 100 : 0;
  const saving = held12 ? (calcTax(cgtIncome + cgtGain, brackets) - taxOnIncome) - cgtTax : 0;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      {/* CGT History */}
      <SLabel>Capital Gains Tax · History</SLabel>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
        {[
          {period:'Pre-1985',label:'No CGT',icon:'✅',color:C.green,
            desc:'Capital gains were entirely untaxed. Selling property, shares or assets — zero tax on profit regardless of size.'},
          {period:'1985 (Keating)',label:'Full Inclusion',icon:'📋',color:C.orange,
            desc:'CGT introduced. 100% of the gain added to income taxed at full marginal rate. Cost base indexed to CPI. Negative gearing quarantined briefly.'},
          {period:'Sep 1999 (Howard)',label:'50% Discount',icon:'✂️',color:C.yellow,
            desc:'Indexation replaced by 50% CGT discount for assets held >12 months. A $200k gain = only $100k taxable income. Massive benefit for property/share investors.'},
          {period:'Super Pension Phase',label:'0% CGT',icon:'🔑',color:C.purple,
            desc:'Assets inside a super fund in pension phase pay zero CGT and zero tax on earnings — one of the most powerful legal tax shelters in Australia.'},
        ].map(item=>(
          <div key={item.period} style={{
            background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${item.color}`,borderRadius:8,padding:'12px 14px',
          }}>
            <div style={{fontSize:18,marginBottom:6}}>{item.icon}</div>
            <div style={{color:item.color,fontFamily:C.mono,fontSize:10,marginBottom:3}}>{item.period}</div>
            <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>{item.label}</div>
            <div style={{fontSize:11,color:C.t2,lineHeight:1.6}}>{item.desc}</div>
          </div>
        ))}
      </div>

      {/* CGT Calculator */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Card>
          <SLabel>CGT Calculator (current era rates)</SLabel>
          <div style={{display:'flex',flexDirection:'column',gap:13}}>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
                <span>Other Income</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(cgtIncome)}</strong>
              </div>
              <input type="range" min={0} max={300000} step={5000} value={cgtIncome} onChange={e=>setCgtIncome(+e.target.value)}/>
            </div>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
                <span>Capital Gain</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(cgtGain)}</strong>
              </div>
              <input type="range" min={0} max={500000} step={5000} value={cgtGain} onChange={e=>setCgtGain(+e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:7}}>
              {[true,false].map(h=>(
                <button key={String(h)} onClick={()=>setHeld12(h)} style={{
                  flex:1,padding:'7px 0',borderRadius:7,
                  border:`1px solid ${held12===h?(h?C.yellow:C.orange)+'50':C.border}`,
                  background:held12===h?`${h?C.yellow:C.orange}12`:'transparent',
                  color:held12===h?(h?C.yellow:C.orange):C.t3,
                  fontSize:12,transition:'all .15s',
                }}>{h?'✂️ >12 months (50% disc.)':'⚡ <12 months (full rate)'}</button>
              ))}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {INCOME_ERAS.slice(-4).map(e=>(
                <button key={e.id} onClick={()=>setEra(e.id)} style={{
                  padding:'3px 8px',borderRadius:4,fontSize:10,
                  border:`1px solid ${era===e.id?e.color+'50':C.border}`,
                  background:era===e.id?`${e.color}12`:'transparent',
                  color:era===e.id?e.color:C.t3,fontFamily:C.mono,transition:'all .15s',
                }}>{e.label}</button>
              ))}
            </div>
            <div style={{background:'rgba(0,0,0,.3)',borderRadius:8,padding:13}}>
              {[
                ['Gross gain',fAUD(cgtGain),''],
                ['Taxable gain',fAUD(taxableGain),held12?'(50% discount)':'(no discount)'],
                ['CGT paid',fAUD(cgtTax),''],
                ['Effective CGT rate',fPct(effRate),''],
                ['Tax saving from discount',fAUD(saving),C.green],
              ].map(([k,v,sub])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'4px 0',borderBottom:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontSize:13}}>{k}</div>
                    {sub&&<div style={{fontSize:10,color:C.t3}}>{sub}</div>}
                  </div>
                  <span style={{fontFamily:C.mono,fontWeight:700,color:k.includes('saving')?C.green:C.t1}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <InfoBox color={C.purple} icon="🏠" title="The Investor Double-Benefit">
            The combination of <strong>negative gearing</strong> (deducting losses at your full marginal rate — up to 45¢) and the <strong>50% CGT discount</strong> on eventual sale is Australia's most powerful investor tax mechanism. Losses deducted at 45¢ but gains taxed at half rate.
          </InfoBox>
          <InfoBox color={C.labor} icon="📋" title="Keating's Quarantine (1985–87)">
            Negative gearing was briefly quarantined so losses could only offset other investment income — not salary. It was reinstated after 2 years, following claims (disputed by many economists) of a rental shortage in Sydney and Perth.
          </InfoBox>
          <InfoBox color={C.yellow} icon="⚖️" title="Budget Cost of These Concessions">
            The ATO estimates: CGT discount ~$6.4B/yr in forgone revenue. Negative gearing ~$3.9B/yr. Super tax concessions ~$50B+/yr. Combined investor concessions represent one of the largest areas of tax expenditure in the federal budget.
          </InfoBox>
          <InfoBox color={C.orange} icon="📊" title="CGT on Crypto & Shares">
            All assets acquired after 20 Sep 1985 are subject to CGT — including crypto, shares, ETFs, options, and collectibles. The 50% discount applies if held >12 months. Super funds pay 10% (not 15%) on discounted gains in accumulation phase.
          </InfoBox>
        </div>
      </div>

      {/* Super */}
      <SLabel>Superannuation Guarantee · Rate History</SLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Card>
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={SUPER_DATA} margin={{top:4,right:16,left:0,bottom:4}}>
              <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.green} stopOpacity={0.35}/>
                  <stop offset="95%" stopColor={C.green} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="2 8" stroke={C.border}/>
              <XAxis dataKey="year" tick={{fill:C.t3,fontSize:10,fontFamily:C.mono}} axisLine={{stroke:C.border}} tickLine={false}/>
              <YAxis tick={{fill:C.t3,fontSize:11,fontFamily:C.mono}} axisLine={false} tickLine={false} width={34} tickFormatter={v=>`${v}%`} domain={[0,14]}/>
              <Tooltip content={<ChartTip fmt={v=>`${v}%`}/>}/>
              <Area type="stepAfter" dataKey="rate" stroke={C.green} fill="url(#sg)" strokeWidth={2.5} name="SG Rate" dot={{fill:C.green,r:4}}/>
            </AreaChart>
          </ResponsiveContainer>
          <div style={{marginTop:8,fontSize:11,color:C.t3}}>Howard froze SG at 9% (2002–2013). Final rate 12% from 1 July 2025.</div>
        </Card>
        <Card>
          <SLabel>Super Tax Rate vs Marginal Rates</SLabel>
          {[
            {label:'Super pension phase (earnings & CGT)',rate:0,color:'#4ade80'},
            {label:'Super accumulation (earnings)',rate:15,color:C.green},
            {label:'Super contributions (concessional)',rate:15,color:C.green},
            {label:'Super >$3M (earnings, from 2025)',rate:30,color:C.yellow},
            {label:'Personal income @ $80k',rate:32.5,color:C.yellow},
            {label:'Personal income @ $180k',rate:37,color:C.orange},
            {label:'Personal income $190k+',rate:45,color:'#f87171'},
          ].map(r=>(
            <div key={r.label} style={{marginBottom:9}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <span style={{color:C.t2,fontSize:11}}>{r.label}</span>
                <span style={{color:r.color,fontFamily:C.mono,fontWeight:700}}>{r.rate}%</span>
              </div>
              <div style={{height:4,background:'#0f172a',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${r.rate/45*100}%`,background:r.color,borderRadius:2,transition:'width .4s'}}/>
              </div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ─── TAB 5: TOTAL BURDEN CALCULATOR ──────────────────────────
function BurdenTab() {
  const [income,setIncome] = useState(90000);
  const [spending,setSpending] = useState(42000);
  const [litres,setLitres] = useState(35);
  const [era,setEra] = useState('albanese_2024');
  const [withMedicare,setWithMedicare] = useState(true);
  const [fhb,setFhb] = useState(false);
  const [propValue,setPropValue] = useState(750000);

  const brackets = INCOME_ERAS.find(e=>e.id===era)?.brackets??[];
  const incomeTax = calcTax(income, brackets);
  const medicareTax = withMedicare ? income * 0.02 : 0;
  const gstPaid = spending * (10/110);
  const fuelExcise = litres * 52 * 0.50;
  const superCost = income * 0.115;
  const totalTax = incomeTax + medicareTax + gstPaid + fuelExcise;
  const takehome = income - incomeTax - medicareTax;

  // Stamp duty for NSW (rough estimate)
  const stampDutyNSW = propValue <= 14000 ? propValue*0.0125
    : propValue <= 30000 ? 175+((propValue-14000)*0.015)
    : propValue <= 80000 ? 415+((propValue-30000)*0.0175)
    : propValue <= 300000 ? 1290+((propValue-80000)*0.035)
    : propValue <= 1000000 ? 8990+((propValue-300000)*0.045)
    : 40490+((propValue-1000000)*0.055);

  const pieces = [
    {label:'Income Tax',value:incomeTax,color:C.liberal},
    {label:'Medicare Levy',value:medicareTax,color:C.labor},
    {label:'GST (on spending)',value:gstPaid,color:C.orange},
    {label:'Fuel Excise',value:fuelExcise,color:C.yellow},
  ].filter(p=>p.value>0);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        {/* Inputs */}
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <Card>
            <SLabel>Your Situation</SLabel>
            <div style={{display:'flex',flexDirection:'column',gap:13}}>
              {[
                {label:'Annual Income',value:income,set:setIncome,min:0,max:400000,step:5000,fmt:fAUD},
                {label:'Annual Spending on GST items',value:spending,set:setSpending,min:0,max:150000,step:2000,fmt:fAUD},
                {label:'Fuel (litres/week)',value:litres,set:setLitres,min:0,max:150,step:5,fmt:v=>`${v}L/wk`},
              ].map(({label,value,set,min,max,step,fmt})=>(
                <div key={label}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
                    <span>{label}</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fmt(value)}</strong>
                  </div>
                  <input type="range" min={min} max={max} step={step} value={value} onChange={e=>set(+e.target.value)}/>
                </div>
              ))}
              <div>
                <div style={{fontSize:12,color:C.t2,marginBottom:7}}>Tax Era</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {INCOME_ERAS.map(e=>(
                    <button key={e.id} onClick={()=>setEra(e.id)} style={{
                      padding:'4px 9px',borderRadius:5,fontSize:11,
                      border:`1px solid ${era===e.id?e.color+'50':C.border}`,
                      background:era===e.id?`${e.color}12`:'transparent',
                      color:era===e.id?e.color:C.t3,fontFamily:C.mono,transition:'all .15s',
                    }}>{e.label.split("'")[0].trim()} '{e.label.split("'")[1]}</button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setWithMedicare(p=>!p)} style={{
                  flex:1,padding:'7px 0',borderRadius:7,
                  border:`1px solid ${withMedicare?C.labor+'50':C.border}`,
                  background:withMedicare?`${C.labor}12`:'transparent',
                  color:withMedicare?C.labor:C.t3,fontSize:12,transition:'all .15s',
                }}>🏥 Medicare {withMedicare?'On':'Off'}</button>
              </div>
            </div>
          </Card>

          {/* Stamp duty estimate */}
          <Card>
            <SLabel>Stamp Duty Estimator (NSW)</SLabel>
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
                <span>Property Value</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(propValue)}</strong>
              </div>
              <input type="range" min={100000} max={3000000} step={25000} value={propValue} onChange={e=>setPropValue(+e.target.value)}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.t2,fontSize:13}}>NSW Stamp Duty</span>
              <span style={{fontFamily:C.mono,fontWeight:700,color:C.orange}}>{fAUD(stampDutyNSW)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.t2,fontSize:13}}>As % of property</span>
              <span style={{fontFamily:C.mono,color:C.t2}}>{fPct(stampDutyNSW/propValue*100,2)}</span>
            </div>
            <div style={{marginTop:8,fontSize:11,color:C.t3}}>See Other Taxes tab for all state comparisons. First home buyer concessions may reduce this significantly.</div>
          </Card>
        </div>

        {/* Output */}
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <Card>
            <SLabel>Estimated Annual Tax Breakdown</SLabel>
            {pieces.map(p=>{
              const pct=income>0?p.value/income*100:0;
              return(
                <div key={p.label} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}>
                    <span style={{color:C.t2}}>{p.label}</span>
                    <div style={{display:'flex',gap:12}}>
                      <span style={{color:C.t3,fontSize:11,fontFamily:C.mono}}>{fPct(pct)}</span>
                      <span style={{color:p.color,fontFamily:C.mono,fontWeight:700,minWidth:72,textAlign:'right'}}>{fAUD(p.value)}</span>
                    </div>
                  </div>
                  <div style={{height:4,background:'#0f172a',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${Math.min(pct*2.8,100)}%`,background:p.color,borderRadius:2,transition:'width .3s'}}/>
                  </div>
                </div>
              );
            })}
            <div style={{borderTop:`1px solid ${C.border}`,marginTop:12,paddingTop:12}}>
              {[
                {l:'Total federal tax (income + Medicare + GST + fuel)',v:fAUD(totalTax),c:'#f87171'},
                {l:'Effective rate on income',v:fPct(totalTax/(income||1)*100),c:C.t2},
                {l:'Take-home after income tax & Medicare',v:fAUD(takehome),c:C.green},
                {l:'Employer super (not your cost, but your value)',v:`+${fAUD(superCost)}`,c:C.yellow},
              ].map(row=>(
                <div key={row.l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.t2,fontSize:12}}>{row.l}</span>
                  <span style={{fontFamily:C.mono,fontWeight:700,color:row.c}}>{row.v}</span>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SLabel>Tax Composition</SLabel>
            <ResponsiveContainer width="100%" height={200}>
              <PieChart>
                <Pie data={pieces} dataKey="value" nameKey="label" cx="50%" cy="50%" outerRadius={80} innerRadius={45} paddingAngle={3}>
                  {pieces.map((p,i)=><Cell key={i} fill={p.color}/>)}
                </Pie>
                <Tooltip content={<ChartTip fmt={fAUD} xLabel="Category"/>}/>
              </PieChart>
            </ResponsiveContainer>
            <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',marginTop:4}}>
              {pieces.map(p=>(
                <div key={p.label} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:p.color}}/><span style={{color:C.t2}}>{p.label}</span>
                </div>
              ))}
            </div>
          </Card>

          <InfoBox color={C.yellow} icon="⚠️" title="Not included in this calculator">
            State land tax, payroll tax (employer cost), council rates, vehicle registration, insurance duty, luxury car tax, alcohol/tobacco excise (unless a driver), customs duty, FBT. The full Australian tax burden is typically 3–7% higher than shown depending on lifestyle.
          </InfoBox>
        </div>
      </div>
    </div>
  );
}

          <div style={{flex:1,minWidth:200}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
              <span>Your taxable income</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(income)}</strong>
            </div>
            <input type="range" min={0} max={300000} step={2000} value={income} onChange={e=>setIncome(+e.target.value)}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
          {[
            {label:'2025-26 saving (16%)',value:baseTax-calcTax(income,INCOME_ERAS.find(e=>e.id==='albanese_2025').brackets),color:'#e879f9',status:'Now law'},
            {label:'2026-27 saving (15%)',value:baseTax-calcTax(income,INCOME_ERAS.find(e=>e.id==='albanese_2026').brackets),color:'#d946ef',status:'Now law'},
            {label:'2027-28 saving (14%)',value:annualSaving,color:'#a21caf',status:'Now law'},
            {label:'WATO offset (2027-28)',value:watoBonus,color:C.green,status:'Proposed'},
            {label:'$1,000 deduction benefit',value:income>18200?Math.round(calcTax(income,INCOME_ERAS.find(e=>e.id==='albanese_2025').brackets)-calcTax(Math.max(0,income-1000),INCOME_ERAS.find(e=>e.id==='albanese_2025').brackets)):0,color:C.yellow,status:'Now law (2026-27)'},
            {label:'Total saving (2027-28 + WATO + deduction)',value:annualSaving+watoBonus+(income>18200?Math.round(calcTax(income,INCOME_ERAS.find(e=>e.id==='albanese_2025').brackets)-calcTax(Math.max(0,income-1000),INCOME_ERAS.find(e=>e.id==='albanese_2025').brackets)):0),color:C.accent,status:'Combined'},
          ].map(item=>(
            <div key={item.label} style={{
              background:`${item.color}08`,border:`1px solid ${item.color}25`,borderRadius:8,padding:'12px',
            }}>
              <div style={{fontSize:22,fontWeight:700,color:item.color,fontFamily:C.mono,lineHeight:1}}>{fAUD(item.value)}/yr</div>
              <div style={{fontSize:12,color:C.t2,marginTop:5}}>{item.label}</div>
              <div style={{fontSize:10,color:item.color,marginTop:3,fontFamily:C.mono}}>{item.status}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:11,color:C.t3}}>Excludes Medicare levy, LITO/LMITO. WATO applies to salary/wage/sole trader income only. $1,000 deduction available without receipts from 2026-27.</div>
      </Card>

      {/* CGT Reform */}
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <SLabel style={{margin:0}}>Capital Gains Tax Reform · From 1 July 2027</SLabel>
          <div style={{padding:'4px 12px',borderRadius:100,background:`${C.yellow}15`,border:`1px solid ${C.yellow}40`,fontSize:11,color:C.yellow,fontFamily:C.mono}}>⚠ PROPOSED — NOT YET LAW</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                {label:'Before Jul 2027',icon:'✂️',title:'50% CGT Discount',desc:'Hold >12 months → only half the gain is taxable. Simple, favours long-term holders.',color:'#64748b',status:'Current law'},
                {label:'From Jul 2027',icon:'📊',title:'Indexation + 30% Min Tax',desc:'Cost base adjusted for inflation (CPI). Tax on real gains only. Minimum 30% rate on net gain.',color:C.yellow,status:'Proposed'},
              ].map(b=>(
                <div key={b.label} style={{background:`${b.color}08`,border:`1px solid ${b.color}25`,borderTop:`3px solid ${b.color}`,borderRadius:8,padding:13}}>
                  <div style={{fontSize:18,marginBottom:5}}>{b.icon}</div>
                  <div style={{fontSize:10,color:b.color,fontFamily:C.mono,marginBottom:3}}>{b.label}</div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>{b.title}</div>
                  <div style={{fontSize:11,color:C.t2,lineHeight:1.6}}>{b.desc}</div>
                  <div style={{marginTop:6,fontSize:10,color:b.color,fontFamily:C.mono}}>{b.status}</div>
                </div>
              ))}
            </div>
            <InfoBox color={C.green} icon="🛡️" title="What's grandfathered?">
              Properties and assets held on 12 May 2026 (Budget night): gains accrued up to 1 July 2027 will still get the 50% discount. Only post-July 2027 gains are taxed under the new regime — so you pay 50% on pre-reform gains and the new rules on new gains.
            </InfoBox>
            <InfoBox color={C.green} icon="🏗️" title="New Builds: Choose Your Regime">
              Investors in new residential property can choose, on disposal, between the old 50% discount OR the new indexation + 30% minimum tax. This is designed to maintain incentives for new housing construction.
            </InfoBox>
          </div>
          <Card>
            <SLabel>CGT Comparison: $300k Gain on Property Held 5 Years</SLabel>
            <div style={{fontSize:13,color:C.t2,marginBottom:14}}>Assumptions: 2.5%/yr inflation, 47% marginal rate, asset purchased Jan 2022, sold Jan 2030.</div>
            {[
              {label:'Current law (50% discount)',steps:[
                ['Gross gain','$300,000'],['Taxable (50% disc.)','$150,000'],['Tax @ 47%','$70,500'],['Effective CGT rate','23.5%'],
              ],color:'#64748b'},
              {label:'Proposed (indexation + 30% min tax)',steps:[
                ['Gross gain','$300,000'],['Inflation adj. (CPI)','~−$38,000'],['Net real gain','~$262,000'],['30% minimum tax','$78,600'],
              ],color:C.yellow,note:'Higher than current law in this example — gains inflation-adjusted but 30% floor may exceed effective discount rate.'},
            ].map(scenario=>(
              <div key={scenario.label} style={{marginBottom:14,padding:12,background:'rgba(0,0,0,.2)',borderRadius:8,border:`1px solid ${scenario.color}25`}}>
                <div style={{fontSize:12,fontWeight:600,color:scenario.color,marginBottom:8}}>{scenario.label}</div>
                {scenario.steps.map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                    <span style={{color:C.t2}}>{k}</span>
                    <span style={{fontFamily:C.mono,color:C.t1}}>{v}</span>
                  </div>
                ))}
                {scenario.note&&<div style={{marginTop:8,fontSize:11,color:C.t3}}>{scenario.note}</div>}
              </div>
            ))}
            <InfoBox color={C.purple} icon="🏠" title="Main Residence Still Exempt">
              The CGT main residence exemption is completely unchanged. Selling your home remains fully CGT-free regardless of gain size.
            </InfoBox>
          </Card>
        </div>
      </div>

      {/* Negative Gearing Reform */}
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <SLabel style={{margin:0}}>Negative Gearing Reform · From 1 July 2027</SLabel>
          <div style={{padding:'4px 12px',borderRadius:100,background:`${C.yellow}15`,border:`1px solid ${C.yellow}40`,fontSize:11,color:C.yellow,fontFamily:C.mono}}>⚠ PROPOSED — NOT YET LAW</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[
            {icon:'✅',color:C.green,title:'Fully Grandfathered',sub:'Properties held before 7:30pm AEST 12 May 2026',
              desc:'No change. Existing investors can continue to offset rental losses against salary and other income indefinitely.'},
            {icon:'🏗️',color:C.liberal,title:'New Builds — Unchanged',sub:'All properties meeting "new build" definition',
              desc:'Full negative gearing and choice of CGT regime (old 50% discount or new indexation) maintained. Incentive to invest in new supply.'},
            {icon:'🚫',color:'#f87171',title:'Established Property — Restricted',sub:'Purchased after 7:30pm AEST 12 May 2026',
              desc:'Net rental losses can only be offset against rental income or property gains — not wages or other income. Unused losses carry forward to future years.'},
          ].map(item=>(
            <div key={item.title} style={{background:C.card,border:`1px solid ${C.border}`,borderTop:`3px solid ${item.color}`,borderRadius:8,padding:14}}>
              <div style={{fontSize:22,marginBottom:7}}>{item.icon}</div>
              <div style={{fontSize:13,fontWeight:600,color:item.color,marginBottom:4}}>{item.title}</div>
              <div style={{fontSize:11,color:item.color,fontFamily:C.mono,marginBottom:7}}>{item.sub}</div>
              <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>{item.desc}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <InfoBox color={C.yellow} icon="⚖️" title="Why Now?">
            The government cited: 83% of the CGT discount benefit flows to the top 10% of income earners; 83% of new investor loans in 2025 were for established properties (not new builds). Reform aims to redirect investor capital toward new housing supply.
          </InfoBox>
          <InfoBox color={C.orange} icon="📊" title="Revenue & Housing Impact">
            Treasury estimates the combined CGT and negative gearing reforms will save ~$7–8B in forgone tax revenue per year by 2030. The government projects modest downward pressure on established property prices and improved first-home-buyer affordability.
          </InfoBox>
        </div>
      </div>

      {/* Other measures */}
      <SLabel>Other Budget Measures</SLabel>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
        {[
          {icon:'💼',color:C.green,status:'Now law (2026-27)',title:'$1,000 Instant Tax Deduction',
            desc:'Workers can claim up to $1,000 in work-related deductions without receipts when lodging their tax return, from the 2026–27 income year. ~6.2M workers benefit, average saving ~$205.'},
          {icon:'🧾',color:C.green,status:'Now law (2027-28)',title:'Working Australians Tax Offset (WATO)',
            desc:'$250 permanent annual offset for all salary, wage, and sole trader income earners from 2027-28. Benefits 13M+ workers. Raises effective tax-free threshold to ~$19,985 (or $24,985 with LITO).'},
          {icon:'🏦',color:C.yellow,status:'Now law (from 2025-26)',title:'Super Balance >$3M: 30% Tax',
            desc:'Earnings (including unrealised gains) in super balances above $3M taxed at 30% — up from 15%. Affects ~80,000 Australians. The inclusion of unrealised gains remains controversial and may face legal challenge.'},
          {icon:'📈',color:C.t3,status:'Ongoing',title:'Medicare Levy Threshold Increase',
            desc:'Low-income threshold for Medicare levy increased by 2.9% from 2025-26. Provides relief to 1M+ low-income individuals, families, seniors and pensioners.'},
        ].map(m=>(
          <div key={m.title} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${m.color}`,borderRadius:8,padding:14}}>
            <div style={{fontSize:20,marginBottom:7}}>{m.icon}</div>
            <div style={{fontSize:10,color:m.color,fontFamily:C.mono,marginBottom:4}}>{m.status}</div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{m.title}</div>
            <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>{m.desc}</div>
          </div>
        ))}
      </div>

      <InfoBox color={C.t3} icon="⚠️" title="Legislative Status">
        The income tax rate cuts (19% → 14%), $1,000 instant deduction, and WATO are legislated and now law. The CGT discount replacement and negative gearing reform (both from July 2027) were announced in the 2026-27 Budget and are NOT yet law — they require Senate passage. Given the government's majority, passage is likely but these may be amended.
      </InfoBox>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────
const TABS = [
  {id:'personal', label:'Personal Income Tax', icon:'👤', C:PersonalTaxTab},
  {id:'company',  label:'Company Tax',          icon:'🏢', C:CompanyTaxTab},
  {id:'investor', label:'Investor Breaks',       icon:'📈', C:InvestorBreaksTab},
  {id:'other',    label:'Other Taxes',           icon:'🏛️', C:OtherTaxesTab},
  {id:'burden',   label:'Total Burden',          icon:'⚖️', C:BurdenTab},
  {id:'budget',   label:'Budget Proposals',      icon:'🏛️', C:BudgetProposalsTab, badge:'NEW'},
];

function App() {
  const [tab,setTab] = useState('personal');
  const Tab = TABS.find(t=>t.id===tab)?.C ?? PersonalTaxTab;

  return (
    <div style={{minHeight:'100vh'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,#0c1829 0%,#060b14 100%)',borderBottom:`1px solid ${C.border}`,padding:'26px 32px 0'}}>
        <div style={{maxWidth:1240,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:14,marginBottom:22}}>
            <div>
              <div style={{fontSize:10,letterSpacing:3,color:C.accent,fontFamily:C.mono,marginBottom:7}}>
                🇦🇺 AUSTRALIAN TAXATION · COMPLETE HISTORICAL GUIDE
              </div>
              <h1 style={{fontSize:24,fontWeight:700,lineHeight:1.25,letterSpacing:-.5}}>
                The Australian Tax System
                <span style={{color:C.accent}}> · 1981–2025</span>
              </h1>
              <p style={{marginTop:7,color:C.t3,fontSize:13,maxWidth:560}}>
                Personal income tax, company rates, investor concessions, CGT, GST, stamp duty, fuel excise & more — across every government era.
              </p>
            </div>
            <div style={{display:'flex',gap:22}}>
              {[{v:'8',l:'Governments'},{v:'12+',l:'Tax Types'},{v:'40+',l:'Years Covered'},{v:'2026',l:'Budget Year'}].map(s=>(
                <div key={s.l} style={{textAlign:'center'}}>
                  <div style={{fontSize:24,fontWeight:700,color:C.accent,fontFamily:C.mono,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:10,color:C.t3,marginTop:3,letterSpacing:.5}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          {/* Tab nav */}
          <div style={{display:'flex',gap:0,overflowX:'auto',paddingBottom:0}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:'11px 18px',
                borderTop:'none',borderLeft:'none',borderRight:'none',
                borderBottom:`2px solid ${tab===t.id?C.accent:'transparent'}`,
                color:tab===t.id?C.accent:C.t3,
                background:'transparent',
                fontSize:13,fontWeight:tab===t.id?600:400,
                fontFamily:'inherit',whiteSpace:'nowrap',transition:'all .15s',cursor:'pointer',
              }}>
                {t.icon} {t.label}
                {t.badge&&<span style={{marginLeft:5,padding:'1px 5px',borderRadius:3,background:'#16a34a',color:'#fff',fontSize:9,fontWeight:700,fontFamily:C.mono}}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:1240,margin:'0 auto',padding:'22px 32px 40px'}}>
        <Tab/>
      </div>

      {/* Footer */}
      <div style={{borderTop:`1px solid ${C.border}`,padding:'18px 32px',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8,fontSize:10,color:C.t4,fontFamily:C.mono,background:'rgba(255,255,255,0.01)'}}>
        <span>Sources: ATO.gov.au · Parliament of Australia · Treasury Budget Papers · REIA · State Revenue Offices</span>
        <span>Educational purposes only · Excludes LITO/LMITO offsets · FY2024–25 AUD</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
