// ─── UTILS ────────────────────────────────────────────────────
function calcTax(income, brackets) {
  if (income <= 0) return 0;
  let t = 0;
  for (const b of brackets) {
    if (income <= b.min) break;
    t += (Math.min(income, b.max === Infinity ? income : b.max) - b.min) * b.rate;
  }
  return t;
}
function marginalRate(income, brackets) {
  let r = 0;
  for (const b of brackets) { if (income > b.min) r = b.rate; }
  return r * 100;
}
const fK = n => n>=1000?`$${(n/1000).toFixed(0)}k`:`$${n}`;
const fAUD = n => `$${Math.round(n).toLocaleString('en-AU')}`;
const fPct = (n,d=1) => `${(+n).toFixed(d)}%`;

// ─── TAB 1: PERSONAL INCOME TAX ───────────────────────────────
function PersonalTaxTab() {
  const [activeEras,setActiveEras] = useState(new Set(INCOME_ERAS.map(e=>e.id)));
  const [mode,setMode] = useState('effective');
  const [income,setIncome] = useState(85000);
  const [expanded,setExpanded] = useState(null);
  const [showEarners,setShowEarners] = useState(true);

  const toggleEra = id => setActiveEras(prev=>{
    const n=new Set(prev);
    if(n.has(id)){if(n.size>1)n.delete(id);}else n.add(id);
    return n;
  });

  const chartData = useMemo(()=>INCOME_PTS.map(inc=>{
    const pt={income:inc};
    for(const era of INCOME_ERAS){
      if(!activeEras.has(era.id)) continue;
      const tax=calcTax(inc,era.brackets);
      pt[era.id]=mode==='effective'
        ? (inc>0?parseFloat((tax/inc*100).toFixed(2)):0)
        : mode==='marginal'
          ? marginalRate(inc,era.brackets)
          : Math.round(tax);
    }
    return pt;
  }),[activeEras,mode]);

  const sliderRows = useMemo(()=>INCOME_ERAS.map(era=>{
    const tax=calcTax(income,era.brackets);
    return{...era,tax,eff:income>0?tax/income*100:0,marg:marginalRate(income,era.brackets),home:income-tax};
  }).filter(e=>activeEras.has(e.id)).sort((a,b)=>a.tax-b.tax),[income,activeEras]);

  const MODES=[{id:'effective',label:'Effective Rate'},{id:'marginal',label:'Marginal Rate'},{id:'dollar',label:'Tax Paid ($)'}];

// ─── FRANKED DIVIDEND CALCULATOR ─────────────────────────────
function FrankedDivCalc() {
  const [divAmount,setDivAmount] = useState(10000);
  const [compRate,setCompRate] = useState(30);
  const [income,setIncome] = useState(85000);

  const compFrac = compRate / 100;
  const frankingCredit = divAmount * compFrac / (1 - compFrac);
  const grossedUp = divAmount + frankingCredit;

  const RATE_ROWS = [
    {label:'0% — No other income / tax-free',rate:0,era:'Any'},
    {label:'14% — Budget 2027-28 (lowest bracket)',rate:0.14,era:'Budget 27-28',color:'#a21caf'},
    {label:'15% — Budget 2026-27',rate:0.15,era:'Budget 26-27',color:'#d946ef'},
    {label:'16% — Budget 2025-26',rate:0.16,era:'Budget 25-26',color:'#e879f9'},
    {label:'19% — Current (2024-25)',rate:0.19,era:'Current',color:'#f43f5e'},
    {label:'30% — Middle bracket ($45k–$135k)',rate:0.30,era:'All eras',color:C.yellow},
    {label:'37% — High income ($135k–$190k)',rate:0.37,era:'All eras',color:C.orange},
    {label:'45% — Top rate ($190k+)',rate:0.45,era:'All eras',color:'#f87171'},
  ];

  // Marginal rate for the slider income (using 2024-25 as baseline)
  const brackets24 = INCOME_ERAS.find(e=>e.id==='albanese_2024').brackets;
  const sliderMarg = marginalRate(income, brackets24) / 100;
  const sliderGrossTax = grossedUp * sliderMarg;
  const sliderNetTax = sliderGrossTax - frankingCredit;
  const sliderRefund = sliderNetTax < 0 ? -sliderNetTax : 0;
  const sliderCashOut = divAmount - Math.max(0, sliderNetTax);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>

                const isYours = Math.abs(row.rate - sliderMarg) < 0.001;

                    </td>
                    <td style={{padding:'6px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:C.green,fontWeight:700}}>{fAUD(cashOut)}</td>

          </table>
          <div style={{marginTop:10,fontSize:11,color:C.t3,lineHeight:1.6}}>

          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── INVESTMENT GROWTH + CGT CALCULATOR ──────────────────────
function InvestCalc() {
  const [principal,setPrincipal] = useState(50000);
  const [annualReturn,setAnnualReturn] = useState(7);
  const [years,setYears] = useState(10);
  const [otherIncome,setOtherIncome] = useState(85000);

  const brackets24 = INCOME_ERAS.find(e=>e.id==='albanese_2024').brackets;
  const brackets27 = INCOME_ERAS.find(e=>e.id==='albanese_2027').brackets;

  function computeScenario(inc, yrs, p, rPct, bCurrentLaw, bFutureLaw) {
    const fv = p * Math.pow(1 + rPct/100, yrs);
    const gain = fv - p;
    if (gain <= 0) return {fv, gain:0, cgtCurrent:0, cgtProposed:0};

    // Current law: 50% CGT discount (if held >12 months)
    const disc = yrs >= 1 ? 0.5 : 1.0;
    const taxableGainCurr = gain * disc;
    const cgtCurrent = Math.max(0,
      calcTax(inc + taxableGainCurr, bCurrentLaw) - calcTax(inc, bCurrentLaw)
    );

    // Proposed law: CPI indexation + 30% minimum tax
    const inflationAdj = p * (Math.pow(1.025, yrs) - 1);
    const realGain = Math.max(0, gain - inflationAdj);
    const marginalCGT = Math.max(0,
      calcTax(inc + realGain, bFutureLaw) - calcTax(inc, bFutureLaw)
    );
    const cgtProposed = Math.max(marginalCGT, realGain * 0.30);

    return {fv, gain, cgtCurrent, cgtProposed};
  }

  const {fv, gain, cgtCurrent, cgtProposed} = computeScenario(otherIncome, years, principal, annualReturn, brackets24, brackets27);

  const chartData = [1,2,3,5,7,10,15,20,25,30].map(y => {
    const r = computeScenario(otherIncome, y, principal, annualReturn, brackets24, brackets27);
    return {
      year: `Yr ${y}`,
      'Value': Math.round(r.fv),
      'Net (current law)': Math.round(r.fv - r.cgtCurrent),
      'Net (proposed law)': Math.round(r.fv - r.cgtProposed),
    };
  });

  const YEAR_OPTIONS = [1,2,3,5,7,10,15,20,25,30];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Card>
          <SLabel>Investment CGT Calculator</SLabel>
          <div style={{display:'flex',flexDirection:'column',gap:13}}>
            {[
              {l:'Initial investment',v:principal,set:setPrincipal,min:1000,max:500000,step:5000,fmt:fAUD},
              {l:'Annual return %',v:annualReturn,set:setAnnualReturn,min:1,max:20,step:0.5,fmt:v=>`${v}%`},
              {l:'Other income (salary etc.)',v:otherIncome,set:setOtherIncome,min:0,max:300000,step:5000,fmt:fAUD},
            ].map(({l,v,set,min,max,step,fmt})=>(
              <div key={l}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
                  <span>{l}</span><strong style={{color:C.t1,fontFamily:C.mono}}>{fmt(v)}</strong>
                </div>
                <input type="range" min={min} max={max} step={step} value={v} onChange={e=>set(+e.target.value)}/>
              </div>
            ))}
            <div>
              <div style={{fontSize:12,color:C.t2,marginBottom:7}}>Sell after</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {YEAR_OPTIONS.map(y=>(
                  <button key={y} onClick={()=>setYears(y)} style={{
                    padding:'5px 10px',borderRadius:5,fontSize:12,
                    border:`1px solid ${years===y?C.accent+'50':C.border}`,
                    background:years===y?`${C.accent}15`:'transparent',
                    color:years===y?C.accent:C.t3,fontFamily:C.mono,transition:'all .15s',
                  }}>{y}yr</button>
                ))}
              </div>
            </div>
            <div style={{background:'rgba(0,0,0,.3)',borderRadius:8,padding:13}}>
              {[
                ['Initial investment',fAUD(principal),''],
                ['Value after '+years+' years',fAUD(fv),C.green],
                ['Total gain',fAUD(gain),C.green],
                ['─','',''],
                ['CGT (current law — 50% disc.)',fAUD(cgtCurrent),'#f87171'],
                ['Net after tax (current law)',fAUD(fv-cgtCurrent),C.liberal],
                ['─','',''],
                ['CGT (proposed — index+30% min)',fAUD(cgtProposed),'#f87171'],
                ['Net after tax (proposed)',fAUD(fv-cgtProposed),C.yellow],
                ['─','',''],
                ['Difference (proposed vs current)',fAUD(cgtProposed-cgtCurrent),cgtProposed>cgtCurrent?'#f87171':C.green],
              ].map(([k,v,c])=>k==='─'?<div key={k+v} style={{height:6}}/>:(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                  <span style={{color:C.t2}}>{k}</span>
                  <span style={{fontFamily:C.mono,fontWeight:600,color:c||C.t1}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:C.t3,lineHeight:1.6}}>
              Proposed law assumes 2.5%/yr CPI indexation and 30% minimum tax on real gain. Current law: 50% discount for assets held &gt;12 months. Assumes purchase after 12 May 2026 (no grandfathering). Main residence always CGT-free.
            </div>
          </div>
        </Card>

        <Card>
          <SLabel>Value Over Time · Current vs Proposed CGT</SLabel>
          <ResponsiveContainer width="100%" height={280}>
            <LineChart data={chartData} margin={{top:4,right:16,left:0,bottom:4}}>
              <CartesianGrid strokeDasharray="2 8" stroke={C.border}/>
              <XAxis dataKey="year" tick={{fill:C.t3,fontSize:10,fontFamily:C.mono}} axisLine={{stroke:C.border}} tickLine={false}/>
              <YAxis tick={{fill:C.t3,fontSize:10,fontFamily:C.mono}} axisLine={false} tickLine={false} width={56} tickFormatter={v=>v>=1000000?`$${(v/1000000).toFixed(1)}M`:`$${(v/1000).toFixed(0)}k`}/>
              <Tooltip content={<ChartTip fmt={fAUD} xLabel="Year"/>}/>
              <Line type="monotone" dataKey="Value" stroke={C.t3} strokeWidth={1.5} dot={false} strokeDasharray="4 4" name="Gross value"/>
              <Line type="monotone" dataKey="Net (current law)" stroke={C.liberal} strokeWidth={2.5} dot={false} name="Net after tax (current law)"/>
              <Line type="monotone" dataKey="Net (proposed law)" stroke={C.yellow} strokeWidth={2.5} dot={false} name="Net after tax (proposed)" strokeDasharray="6 3"/>
            </LineChart>
          </ResponsiveContainer>
          <div style={{display:'flex',gap:14,marginTop:10,justifyContent:'center'}}>
            {[{c:C.t3,l:'Gross value',d:'4 4'},{c:C.liberal,l:'Net: current law'},{c:C.yellow,l:'Net: proposed law',d:'6 3'}].map(p=>(
              <div key={p.l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:C.t2}}>
                <div style={{width:16,height:2.5,background:p.c,borderRadius:2}}/>{p.l}
              </div>
            ))}
          </div>
          <div style={{marginTop:14}}>
            <SLabel>Comparison Table</SLabel>
            <div style={{overflowX:'auto'}}>
              <table>
                <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {['Years','Value','Gain','CGT (current)','Net (current)','CGT (proposed)','Net (proposed)','Difference'].map(h=>(
                    <th key={h} style={{textAlign:h==='Years'?'left':'right',padding:'5px 8px',color:C.t3,fontWeight:600,fontSize:10,fontFamily:C.mono,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {YEAR_OPTIONS.map((y,i)=>{
                    const r=computeScenario(otherIncome,y,principal,annualReturn,brackets24,brackets27);
                    const diff=r.cgtProposed-r.cgtCurrent;
                    const isSelected=years===y;
                    return(
                      <tr key={y} onClick={()=>setYears(y)} style={{
                        background:isSelected?'rgba(59,130,246,.1)':i%2===0?'rgba(255,255,255,.01)':'transparent',
                        borderBottom:`1px solid ${C.border}`,cursor:'pointer',
                      }}>
                        <td style={{padding:'5px 8px',fontFamily:C.mono,color:isSelected?C.accent:C.t2,fontWeight:isSelected?700:400}}>{y}yr</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:C.t1}}>{fAUD(r.fv)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:C.green}}>{fAUD(r.gain)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:'#f87171'}}>{fAUD(r.cgtCurrent)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:C.liberal}}>{fAUD(r.fv-r.cgtCurrent)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:'#f87171'}}>{fAUD(r.cgtProposed)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:C.yellow}}>{fAUD(r.fv-r.cgtProposed)}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontFamily:C.mono,fontSize:11,color:diff>0?'#f87171':C.green,fontWeight:700}}>
                          {diff>0?`+${fAUD(diff)}`:`−${fAUD(-diff)}`}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:8,fontSize:10,color:C.t4}}>Click a row to update the calculator · Difference = extra CGT under proposed vs current law</div>
          </div>
        </Card>
      </div>
    </div>
  );
}

function SmallBizCGTCalc() {
  const [gain,setGain] = useState(800000);
  const [held15,setHeld15] = useState(false);
  const [retiring,setRetiring] = useState(false);
  const [age55,setAge55] = useState(true);
  const [useRetirementExempt,setUseRetirementExempt] = useState(true);
  const [otherIncome,setOtherIncome] = useState(85000);
  const [postBudget,setPostBudget] = useState(false);
  const RETIRE_CAP = 500000;
  const LIFETIME_CGT_CAP = 1865000;

  // Step by step calculation
  const steps = [];
  let remaining = gain;

  // Step 0: General discount
  if (held15 && retiring) {
    steps.push({label:'15-Year Exemption applied',action:`100% of gain eliminated`,result:0,color:C.green,law:'Div 152-B'});
    remaining = 0;
  } else {
    if (!postBudget) {
      const disc = remaining * 0.5;
      steps.push({label:'General 50% CGT discount (held >12 months)',action:`$${Math.round(disc).toLocaleString('en-AU')} removed`,result:remaining-disc,color:C.t3,law:'General'});
      remaining -= disc;
    } else {
      const inflation = remaining * 0.15; // rough 2.5% pa × ~6yr avg assumed
      steps.push({label:'CPI indexation (proposed — ~2.5%/yr cost base adj.)',action:`~$${Math.round(inflation).toLocaleString('en-AU')} removed`,result:remaining-inflation,color:C.yellow,law:'Proposed from Jul 2027'});
      remaining = Math.max(0, remaining - inflation);
    }
    // Active asset 50%
    const aaReduction = remaining * 0.5;
    steps.push({label:'50% Active Asset Reduction (Div 152-C)',action:`$${Math.round(aaReduction).toLocaleString('en-AU')} removed`,result:remaining-aaReduction,color:C.yellow,law:'Div 152-C · Unchanged'});
    remaining -= aaReduction;

    // Retirement exemption
    if (useRetirementExempt && remaining > 0) {
      const exempt = Math.min(remaining, RETIRE_CAP);
      const note = age55 ? 'No super requirement (age 55+)' : 'Must contribute to super (under 55)';
      steps.push({label:`Retirement Exemption — ${note}`,action:`$${Math.round(exempt).toLocaleString('en-AU')} exempt (lifetime cap $500k)`,result:remaining-exempt,color:C.orange,law:'Div 152-D · Unchanged'});
      remaining -= exempt;
    }
  }

  // Final CGT
  const brackets = INCOME_ERAS.find(e=>e.id==='albanese_2024').brackets;
  const finalCGT = remaining > 0
    ? Math.max(
        calcTax(otherIncome + remaining, brackets) - calcTax(otherIncome, brackets),
        postBudget ? remaining * 0.30 : 0
      )
    : 0;

  return (
    <Card>
      <SLabel>Div 152 Stacking Calculator — Small Business Sale</SLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        {/* Inputs */}
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
              <span>Business sale capital gain</span>
              <strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(gain)}</strong>
            </div>
            <input type="range" min={50000} max={5000000} step={50000} value={gain} onChange={e=>setGain(+e.target.value)}/>
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
              <span>Other income (salary etc.)</span>
              <strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(otherIncome)}</strong>
            </div>
            <input type="range" min={0} max={300000} step={5000} value={otherIncome} onChange={e=>setOtherIncome(+e.target.value)}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {[
              {label:'Owned business 15+ years',val:held15,set:setHeld15,note:'Enables 15-yr exemption if also retiring'},
              {label:'Retiring / permanently incapacitated',val:retiring,set:setRetiring,note:'Required for 15-yr exemption'},
              {label:'Aged 55 or over',val:age55,set:setAge55,note:'Under 55 must put retirement exemption into super'},
              {label:'Apply retirement exemption (up to $500k)',val:useRetirementExempt,set:setUseRetirementExempt,note:'Lifetime cap $500,000'},
            ].map(opt=>(
              <div key={opt.label} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'8px 10px',borderRadius:7,background:'rgba(255,255,255,.02)',border:`1px solid ${C.border}`,cursor:'pointer'}}
                onClick={()=>opt.set(!opt.val)}>
                <div style={{width:16,height:16,borderRadius:4,background:opt.val?C.green:'transparent',border:`2px solid ${opt.val?C.green:C.t3}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                  {opt.val&&<div style={{width:8,height:8,borderRadius:2,background:'#060b14'}}/>}
                </div>
                <div>
                  <div style={{fontSize:12,color:C.t1}}>{opt.label}</div>
                  <div style={{fontSize:10,color:C.t3,marginTop:1}}>{opt.note}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            {[
              {v:false,l:'Current Law (50% discount)'},
              {v:true,l:'Proposed (post Jul 2027)'},
            ].map(o=>(
              <button key={String(o.v)} onClick={()=>setPostBudget(o.v)} style={{
                flex:1,padding:'7px 0',borderRadius:7,fontSize:12,
                border:`1px solid ${postBudget===o.v?(o.v?C.yellow:C.liberal)+'50':C.border}`,
                background:postBudget===o.v?`${o.v?C.yellow:C.liberal}12`:'transparent',
                color:postBudget===o.v?(o.v?C.yellow:C.liberal):C.t3,transition:'all .15s',
              }}>{o.l}</button>
            ))}
          </div>
        </div>

        {/* Results */}
        <div>
          <div style={{fontSize:12,color:C.t3,fontFamily:C.mono,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Calculation Waterfall</div>
          <div style={{display:'flex',flexDirection:'column',gap:1,marginBottom:14}}>
            {/* Starting gain */}
            <div style={{display:'flex',justifyContent:'space-between',padding:'7px 10px',background:'rgba(255,255,255,.03)',borderRadius:'6px 6px 0 0',fontSize:13}}>
              <span style={{color:C.t2}}>Starting gain</span>
              <span style={{fontFamily:C.mono,fontWeight:700,color:'#f87171'}}>{fAUD(gain)}</span>
            </div>
            {steps.map((s,i)=>(
              <div key={i} style={{padding:'7px 10px',background:'rgba(0,0,0,.25)',fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{color:C.t2}}>{s.label}</span>
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.t4}}>{s.law}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:s.color,fontSize:11}}>−{s.action}</span>
                  <span style={{fontFamily:C.mono,fontWeight:700,color:s.result===0?C.green:C.t1}}>{fAUD(s.result)} remaining</span>
                </div>
              </div>
            ))}
            {/* CGT payable */}
            <div style={{
              padding:'10px 12px',
              background:finalCGT===0?`${C.green}15`:'rgba(248,113,113,.1)',
              borderRadius:'0 0 6px 6px',
              border:`1px solid ${finalCGT===0?C.green+'40':'#f8717140'}`,
            }}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700}}>
                <span style={{color:C.t1}}>{finalCGT===0?'🎉 CGT payable':'CGT payable'}</span>
                <span style={{fontFamily:C.mono,color:finalCGT===0?C.green:'#f87171'}}>{fAUD(finalCGT)}</span>
              </div>
              {remaining > 0 && <div style={{fontSize:11,color:C.t3,marginTop:4}}>
                Taxable gain: {fAUD(remaining)} at {(marginalRate(otherIncome+remaining,INCOME_ERAS.find(e=>e.id==='albanese_2024').brackets)).toFixed(0)}% marginal{postBudget?' (30% floor applies)':''}
              </div>}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {label:'Gross sale gain',value:fAUD(gain),color:C.t2},
              {label:'CGT payable',value:fAUD(finalCGT),color:finalCGT===0?C.green:'#f87171'},
              {label:'Effective CGT rate',value:fPct(gain>0?finalCGT/gain*100:0),color:C.t2},
              {label:'Net proceeds after tax',value:fAUD(gain-finalCGT),color:C.green},
            ].map(s=>(
              <div key={s.label} style={{background:'rgba(0,0,0,.3)',borderRadius:7,padding:'10px 12px',textAlign:'center'}}>
                <div style={{fontSize:17,fontWeight:700,fontFamily:C.mono,color:s.color}}>{s.value}</div>
                <div style={{fontSize:10,color:C.t3,marginTop:3}}>{s.label}</div>
              </div>
            ))}
          </div>
          {!held15&&useRetirementExempt&&remaining<=0&&(
            <div style={{marginTop:10,padding:'8px 12px',background:`${C.green}10`,border:`1px solid ${C.green}30`,borderRadius:7,fontSize:12,color:C.green}}>
              ✅ Qualifying owners applying all Div 152 concessions can achieve $0 CGT on gains up to ~{fAUD(gain)}. This is unchanged by the 2026-27 Budget.
            </div>
          )}
          {held15&&retiring&&(
            <div style={{marginTop:10,padding:'8px 12px',background:`${C.green}10`,border:`1px solid ${C.green}30`,borderRadius:7,fontSize:12,color:C.green}}>
              ✅ 15-year exemption: 100% of {fAUD(gain)} gain is completely exempt. $0 CGT. Fully preserved under the budget reforms.
            </div>
          )}
        </div>
      </div>
    </Card>
  );
}

// ─── TRUST CALCULATOR ────────────────────────────────────────
function TrustCalc() {
  const defaultBens = [
    {id:1, name:'Primary earner',         otherIncome:120000, weight:40},
    {id:2, name:'Non-working spouse',     otherIncome:0,      weight:30},
    {id:3, name:'Adult child (studying)', otherIncome:8000,   weight:20},
    {id:4, name:'Retired parent',         otherIncome:22000,  weight:10},
  ];
  const [trustIncome, setTrustIncome] = useState(300000);
  const [bens, setBens] = useState(defaultBens);
  const [showProposed, setShowProposed] = useState(false);

  const brackets = INCOME_ERAS.find(e=>e.id==='albanese_2027').brackets;
  const totalW = bens.reduce((s,b)=>s+b.weight, 0) || 1;

  // ── Current law ──────────────────────────────────────────────
  const currentRows = bens.map(b=>{
    const pct = b.weight / totalW;
    const dist = trustIncome * pct;
    const taxWith = calcTax(b.otherIncome + dist, brackets);
    const taxWithout = calcTax(b.otherIncome, brackets);
    const taxOnDist = Math.max(0, taxWith - taxWithout);
    const marg = marginalRate(b.otherIncome + dist, brackets);
    return {...b, pct, dist, taxOnDist, marg, netCash: dist - taxOnDist};
  });
  const totalCurrentTax = currentRows.reduce((s,r)=>s+r.taxOnDist, 0);
  const currentEffRate = trustIncome > 0 ? totalCurrentTax / trustIncome * 100 : 0;

  // ── Proposed law (30% trust minimum, then franked distributions) ─
  const trustTax = trustIncome * 0.30;
  const netPool = trustIncome * 0.70;
  const proposedRows = bens.map(b=>{
    const pct = b.weight / totalW;
    const afterTaxDist = netPool * pct;           // cash received from trust
    const grossedUp = afterTaxDist / 0.70;        // add back trust tax credit (like franking)
    const trustCredit = grossedUp * 0.30;         // their share of trust tax
    const taxOnGrossed = Math.max(0, calcTax(b.otherIncome + grossedUp, brackets) - calcTax(b.otherIncome, brackets));
    const topUp = Math.max(0, taxOnGrossed - trustCredit);
    const refund = Math.max(0, trustCredit - taxOnGrossed);
    const netCash = afterTaxDist + refund - topUp;
    return {...b, pct, afterTaxDist, grossedUp, trustCredit, taxOnGrossed, topUp, refund, netCash};
  });
  const totalRefunds = proposedRows.reduce((s,r)=>s+r.refund, 0);
  const totalTopUp   = proposedRows.reduce((s,r)=>s+r.topUp, 0);
  const totalProposedTax = trustTax + totalTopUp - totalRefunds;
  const proposedEffRate = trustIncome > 0 ? totalProposedTax / trustIncome * 100 : 0;
  const extraTax = totalProposedTax - totalCurrentTax;

  const updateBen = (id, field, val) =>
    setBens(prev => prev.map(b => b.id === id ? {...b, [field]: val} : b));

  const activeRows = showProposed ? proposedRows : currentRows;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Trust income slider */}
      <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.t2,marginBottom:5}}>
            <span>Trust net taxable income</span>
            <strong style={{color:C.t1,fontFamily:C.mono}}>{fAUD(trustIncome)}</strong>
          </div>
          <input type="range" min={20000} max={2000000} step={10000}
            value={trustIncome} onChange={e=>setTrustIncome(+e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setShowProposed(false)} style={{
            padding:'7px 14px',borderRadius:7,fontSize:12,
            border:`1px solid ${!showProposed?C.liberal+'50':C.border}`,
            background:!showProposed?`${C.liberal}15`:'transparent',
            color:!showProposed?C.liberal:C.t3,transition:'all .15s',
          }}>Current Law</button>
          <button onClick={()=>setShowProposed(true)} style={{
            padding:'7px 14px',borderRadius:7,fontSize:12,
            border:`1px solid ${showProposed?C.yellow+'50':C.border}`,
            background:showProposed?`${C.yellow}12`:'transparent',
            color:showProposed?C.yellow:C.t3,transition:'all .15s',
          }}>Proposed (from 2028)</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Beneficiaries */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:11,color:C.t3,fontFamily:C.mono,letterSpacing:2,textTransform:'uppercase'}}>Beneficiaries</div>
          {bens.map(b=>{
            const pct = b.weight / totalW;
            const row = activeRows.find(r=>r.id===b.id);
            return (
              <div key={b.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:13}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <input value={b.name} onChange={e=>updateBen(b.id,'name',e.target.value)}
                    style={{background:'transparent',border:'none',color:C.t1,fontSize:13,fontWeight:600,fontFamily:'inherit',flex:1,outline:'none',cursor:'text'}}/>
                  <div style={{fontSize:10,color:C.accent,fontFamily:C.mono,fontWeight:700,whiteSpace:'nowrap'}}>
                    {(pct*100).toFixed(0)}%
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:9}}>
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.t3,marginBottom:4}}>
                      <span>Other income</span>
                      <span style={{fontFamily:C.mono}}>{fAUD(b.otherIncome)}</span>
                    </div>
                    <input type="range" min={0} max={250000} step={2000}
                      value={b.otherIncome} onChange={e=>updateBen(b.id,'otherIncome',+e.target.value)}/>
                  </div>
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.t3,marginBottom:4}}>
                      <span>Share of trust income</span>
                      <span style={{fontFamily:C.mono}}>{b.weight} pts → {fAUD(row?.dist||row?.afterTaxDist||0)}</span>
                    </div>
                    <input type="range" min={0} max={100} step={5}
                      value={b.weight} onChange={e=>updateBen(b.id,'weight',+e.target.value)}/>
                  </div>
                  {/* Result pill */}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}}>
                    {showProposed ? [
                      {l:'Cash dist',v:fAUD(row?.afterTaxDist||0),c:C.t2},
                      {l:row?.refund>0?'Refund':'Top-up',v:row?.refund>0?`+${fAUD(row.refund)}`:(row?.topUp>0?`-${fAUD(row.topUp)}`:'$0'),c:row?.refund>0?C.green:'#f87171'},
                      {l:'Net cash',v:fAUD(row?.netCash||0),c:C.green},
                    ] : [
                      {l:'Distribution',v:fAUD(row?.dist||0),c:C.t2},
                      {l:'Tax paid',v:`-${fAUD(row?.taxOnDist||0)}`,c:'#f87171'},
                      {l:'Net cash',v:fAUD(row?.netCash||0),c:C.green},
                    ].map(s=>(
                      <div key={s.l} style={{background:'rgba(0,0,0,.25)',borderRadius:5,padding:'5px 6px',textAlign:'center'}}>
                        <div style={{fontSize:12,fontWeight:700,fontFamily:C.mono,color:s.c}}>{s.v}</div>
                        <div style={{fontSize:9,color:C.t3,marginTop:1}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Results */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SLabel>Summary — {showProposed?'Proposed Law (from 2028)':'Current Law'}</SLabel>
            {showProposed && (
              <div style={{background:`${C.yellow}08`,border:`1px solid ${C.yellow}25`,borderRadius:8,padding:'10px 12px',marginBottom:14}}>
                <div style={{fontSize:11,color:C.yellow,fontFamily:C.mono,fontWeight:600,marginBottom:4}}>TRUST-LEVEL TAX (paid first)</div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={{color:C.t2}}>30% minimum tax on ${fAUD(trustIncome)} income</span>
                  <span style={{fontFamily:C.mono,fontWeight:700,color:'#f87171'}}>{fAUD(trustTax)}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:4}}>
                  <span style={{color:C.t3}}>Distributable (after-tax) pool</span>
                  <span style={{fontFamily:C.mono,color:C.t2}}>{fAUD(netPool)}</span>
                </div>
                <div style={{fontSize:11,color:C.t3,marginTop:6}}>Distributions then flow with a 30% franking-style credit, like a company dividend. Low-rate beneficiaries get a cash refund; high-rate beneficiaries pay a top-up.</div>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:3,marginBottom:14}}>
              {activeRows.map(r=>(
                <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 8px',borderRadius:6,background:'rgba(255,255,255,.015)',fontSize:12}}>
                  <div style={{minWidth:150,color:C.t2}}>{r.name}</div>
                  <div style={{display:'flex',gap:12,fontFamily:C.mono,fontSize:11}}>
                    {showProposed ? <>
                      <span style={{color:C.t3}}>{(r.pct*100).toFixed(0)}%</span>
                      <span style={{color:r.refund>0?C.green:'#f87171',minWidth:90,textAlign:'right'}}>
                        {r.refund>0?`+${fAUD(r.refund)} refund`:r.topUp>0?`+${fAUD(r.topUp)} top-up`:'at 30% rate'}
                      </span>
                      <span style={{color:C.green,minWidth:72,textAlign:'right'}}>{fAUD(r.netCash)}</span>
                    </> : <>
                      <span style={{color:C.t3}}>{r.marg.toFixed(0)}% marg</span>
                      <span style={{color:'#f87171',minWidth:72,textAlign:'right'}}>-{fAUD(r.taxOnDist)}</span>
                      <span style={{color:C.green,minWidth:72,textAlign:'right'}}>{fAUD(r.netCash)}</span>
                    </>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
              {showProposed ? [
                ['Total trust tax (30%)', fAUD(trustTax), '#f87171'],
                ['Individual refunds (to low earners)', `-${fAUD(totalRefunds)}`, C.green],
                ['Individual top-ups (from high earners)', `+${fAUD(totalTopUp)}`, '#f87171'],
                ['Net family tax burden', fAUD(totalProposedTax), C.yellow],
                ['Effective rate', fPct(proposedEffRate), C.yellow],
              ] : [
                ['Total tax paid by all beneficiaries', fAUD(totalCurrentTax), '#f87171'],
                ['Effective rate on trust income', fPct(currentEffRate), C.t2],
                ['Net family income after tax', fAUD(trustIncome-totalCurrentTax), C.green],
              ].map(([k,v,c])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.t2}}>{k}</span>
                  <span style={{fontFamily:C.mono,fontWeight:700,color:c}}>{v}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* Comparison summary */}
          <Card>
            <SLabel>Current vs Proposed Comparison</SLabel>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              {[
                {label:'Current Law',tax:totalCurrentTax,rate:currentEffRate,net:trustIncome-totalCurrentTax,color:C.liberal},
                {label:'Proposed (2028)',tax:totalProposedTax,rate:proposedEffRate,net:trustIncome-totalProposedTax,color:C.yellow},
              ].map(s=>(
                <div key={s.label} style={{background:`${s.color}08`,border:`1px solid ${s.color}25`,borderRadius:8,padding:12,textAlign:'center'}}>
                  <div style={{fontSize:11,color:s.color,fontFamily:C.mono,marginBottom:6}}>{s.label}</div>
                  <div style={{fontSize:22,fontWeight:700,color:'#f87171',fontFamily:C.mono}}>{fAUD(s.tax)}</div>
                  <div style={{fontSize:11,color:C.t3}}>total tax · {fPct(s.rate)} eff rate</div>
                  <div style={{marginTop:6,fontSize:14,fontWeight:600,color:C.green,fontFamily:C.mono}}>{fAUD(s.net)}</div>
                  <div style={{fontSize:10,color:C.t3}}>family keeps</div>
                </div>
              ))}
            </div>
            <div style={{
              padding:'12px 14px',borderRadius:8,textAlign:'center',
              background:extraTax>0?'rgba(248,113,113,.08)':'rgba(74,222,128,.08)',
              border:`1px solid ${extraTax>0?'#f8717130':C.green+'30'}`,
            }}>
              <div style={{fontSize:24,fontWeight:700,fontFamily:C.mono,color:extraTax>0?'#f87171':C.green}}>
                {extraTax>0?'+':'-'}{fAUD(Math.abs(extraTax))}
              </div>
              <div style={{fontSize:12,color:C.t2,marginTop:4}}>
                extra tax under proposed law
              </div>
              <div style={{fontSize:11,color:C.t3,marginTop:3}}>
                Family loses {fAUD(Math.abs(extraTax))} per year in after-tax income
              </div>
            </div>
            <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:5}}>
              <ResponsiveContainer width="100%" height={120}>
                <BarChart data={[
                  {name:'Current',tax:Math.round(totalCurrentTax),keep:Math.round(trustIncome-totalCurrentTax)},
                  {name:'Proposed',tax:Math.round(totalProposedTax),keep:Math.round(trustIncome-totalProposedTax)},
                ]} margin={{top:4,right:8,left:0,bottom:4}}>
                  <XAxis dataKey="name" tick={{fill:C.t3,fontSize:11,fontFamily:C.mono}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fill:C.t3,fontSize:10,fontFamily:C.mono}} axisLine={false} tickLine={false} width={56} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`}/>
                  <Tooltip content={<ChartTip fmt={fAUD} xLabel="Scenario"/>}/>
                  <Bar dataKey="keep" name="Family keeps" fill={C.green} stackId="a" radius={[0,0,0,0]}/>
                  <Bar dataKey="tax" name="Tax paid" fill={'#f87171'} stackId="a" radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </Card>

          <InfoBox color={C.t3} icon="⚠️" title="Disclaimer">
            The proposed trust minimum tax legislation has not been released. This calculator models the most likely mechanism — a company-style 30% prepaid tax with franking-equivalent credits flowing to beneficiaries. The actual detail may differ. Consult a tax adviser before restructuring.
          </InfoBox>
        </div>
      </div>
    </div>
  );
}

// ─── TAB 6: BUDGET PROPOSALS ─────────────────────────────────

      </div>

      <InfoBox color={C.t3} icon="⚠️" title="Legislative Status">
        The income tax rate cuts (19%→14%), $1,000 instant deduction, and WATO are legislated and now law. The CGT discount replacement, negative gearing reform, trust minimum tax, and other structural measures are NOT yet law — they require Senate passage. The government has a workable majority but the detail legislation may be amended, particularly around startups. Consult a tax adviser before making decisions based on proposed measures.
      </InfoBox>
    </div>
  );
}
